<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DailyFlash</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f0f0f;
        color: #e0e0e0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      h1 {
        font-size: 2.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 0.5rem;
      }
      .tagline {
        color: #888;
        font-size: 1rem;
      }
      .badge {
        margin-top: 2rem;
        padding: 0.4rem 1rem;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 999px;
        font-size: 0.8rem;
        color: #666;
      }
    </style>
  </head>
  <body>
    <h1>⚡ DailyFlash</h1>
    <p class="tagline">今日、この瞬間だけを映すダッシュボード</p>
    <span class="badge">Tauri v2 + Rust — 起動確認済み</span>
  </body>
</html>
