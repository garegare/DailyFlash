name: Build

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust-targets: aarch64-apple-darwin
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust-targets: x86_64-apple-darwin
          - platform: windows-latest
            args: "--target x86_64-pc-windows-msvc"
            rust-targets: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      # PR / main push: ビルド確認のみ（リリースは作成しない）
      - name: Build (check only)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: npm run tauri build -- ${{ matrix.args }}

      # タグ push 時のみ: ドラフトリリースを作成してアーティファクトをアップロード
      - name: Build and release
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "DailyFlash ${{ github.ref_name }}"
          releaseBody: |
            ## DailyFlash ${{ github.ref_name }}

            ### インストール方法
            - **macOS (Apple Silicon)**: `DailyFlash_*_aarch64.dmg` をダウンロード
            - **macOS (Intel)**: `DailyFlash_*_x64.dmg` をダウンロード
            - **Windows (x64) インストーラ**: `DailyFlash_*_x64-setup.exe` をダウンロード
            - **Windows (x64) ポータブル**: `DailyFlash_portable.exe` をダウンロード（インストール不要、そのまま実行可）
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Windows のみ: ポータブル exe をリリースに追加アップロード
      - name: Upload portable exe
        if: startsWith(github.ref, 'refs/tags/') && matrix.rust-targets == 'x86_64-pc-windows-msvc'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $exe = Get-ChildItem -Path "src-tauri/target" -Filter "DailyFlash.exe" -Recurse |
            Where-Object { $_.FullName -match "\\release\\DailyFlash\.exe$" } |
            Select-Object -First 1
          if (-not $exe) { Write-Error "DailyFlash.exe not found"; exit 1 }
          Write-Host "Found: $($exe.FullName)"
          Copy-Item $exe.FullName "DailyFlash_portable.exe"
          gh release upload "${{ github.ref_name }}" DailyFlash_portable.exe --clobber
